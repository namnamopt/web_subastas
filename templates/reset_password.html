{% extends "base.html" %}

{% block title %}Restablecer Contraseña{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-lg border-0">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-shield-lock" style="font-size: 3rem; color: #0d6efd;"></i>
                        <h3 class="fw-bold mt-2">Restablecer Contraseña</h3>
                        <p class="text-muted">Ingresa tu nueva contraseña</p>
                    </div>
                    
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label fw-bold">
                                <i class="bi bi-lock"></i> Nueva Contraseña
                            </label>
                            <input type="password" class="form-control form-control-lg" 
                                   name="password" placeholder="Mínimo 6 caracteres" 
                                   minlength="6" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">
                                <i class="bi bi-shield-check"></i> Confirmar Contraseña
                            </label>
                            <input type="password" class="form-control form-control-lg" 
                                   name="confirm_password" placeholder="Repite tu contraseña" 
                                   minlength="6" required>
                        </div>
                        
                        <button type="submit" class="btn btn-primary btn-lg w-100">
                            <i class="bi bi-check-circle"></i> Actualizar Contraseña
                        </button>
                    </form>
                    
                    <div class="text-center mt-3">
                        <a href="{{ url_for('login') }}" class="text-decoration-none">
                            <i class="bi bi-arrow-left"></i> Volver al inicio de sesión
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// Mostrar/ocultar contraseña si lo deseas
document.querySelector('form').addEventListener('submit', function(e) {
    const password = this.querySelector('input[name="password"]').value;
    const confirm = this.querySelector('input[name="confirm_password"]').value;
    
    if (password !== confirm) {
        e.preventDefault();
        alert('❌ Las contraseñas no coinciden');
        return false;
    }
    
    if (password.length < 6) {
        e.preventDefault();
        alert('❌ La contraseña debe tener al menos 6 caracteres');
        return false;
    }
    
    return true;
});
</script>
{% endblock %}
